name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[torch,lego,data,dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core
        run: |
          pip install -e ".[torch,lego,data,dev]"

      - name: Check top-level imports
        run: |
          python -c "
          from foundry import (
              DataPipeline,
              TorchDistillTrainer, TorchTrainConfig,
              CachedDistillTrainer, CachedDistillConfig,
              EmbeddingDistillTrainer, EmbeddingDistillConfig,
              TeacherRegistry, HFTeacher, ToyTeacher, LogitCache,
              SkillPack, SkillRegistry,
              GrowthPlan, plan_growth, build_upscaled_state_dict,
              Recipe, FoundryRecipe, EmbedRecipe, DataConfig,
              detect_backend,
          )
          print('All imports OK')
          "
