name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:   # allow manual redeploy from the Actions tab

permissions:
  contents: write       # needed to push the built site to gh-pages

jobs:
  deploy:
    name: Build & deploy to gh-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so gh-deploy can update gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs + Material
        run: pip install -e ".[docs]"

      - name: Validate build (strict)
        run: mkdocs build --strict --site-dir /tmp/site

      - name: Deploy
        run: mkdocs gh-deploy --force
